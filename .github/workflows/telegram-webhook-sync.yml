name: Telegram Webhook Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Telegram Webhook
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: npm run telegram:sync-webhook
